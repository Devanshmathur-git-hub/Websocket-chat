<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
</head>
<body>

<h2>Real-time Chat</h2>

<input id="username" placeholder="Your name"><br><br>

<div id="chat" style="height:300px; border:1px solid black; overflow:auto;"></div>

<br>
<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
  const socket = io("http://localhost:5001");

  function send() {
    const sender = document.getElementById("username").value;
    const content = document.getElementById("msg").value;

    socket.emit("sendMessage", { sender, content });
    document.getElementById("msg").value = "";
  }

  socket.on("receiveMessage", (data) => {
    const chat = document.getElementById("chat");

    const p = document.createElement("p");
    p.innerText = data.sender + ": " + data.content;

    chat.appendChild(p);
    chat.scrollTop = chat.scrollHeight;
  });
</script>

</body>
</html>
